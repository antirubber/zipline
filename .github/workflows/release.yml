name: release

# Tag a release (e.g. `git tag v0.1.0 && git push --tags`) to build the static
# binaries that install.sh downloads.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            asset: zipline-linux-amd64
          - target: aarch64-unknown-linux-musl
            asset: zipline-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross
        run: cargo install cross --locked
      - name: Build static binary
        run: cross build --release --target ${{ matrix.target }} --bin zipline
      - name: Stage asset and checksum
        run: |
          cp "target/${{ matrix.target }}/release/zipline" "${{ matrix.asset }}"
          sha256sum "${{ matrix.asset }}" > "${{ matrix.asset }}.sha256"
      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.asset }}
            ${{ matrix.asset }}.sha256
          fail_on_unmatched_files: true
